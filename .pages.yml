media:
  - name: images
    input: images/posts
    output: /images/posts
    extensions: [png, jpg, webp]
  - name: models
    label: 3D Models
    input: assets/models
    output: /assets/models
    extensions: [stl]

content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    format: yaml-frontmatter
    filename: "{year}/{year}-{month}-{day}-{fields.title}.md"
    media: images
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: tags
        label: Tags
        type: list
        required: false
      - name: categories
        label: Categories
        type: list
        required: false
      - name: body
        label: Content
        type: rich-text
        options:
            media: images

  # --- Project collections ---
  # Add as many of these as you need, one per project
  - name: project-pens
    label: "Project: Pens"
    type: collection
    path: _posts
    format: yaml-frontmatter
    filename: "{year}/{year}-{month}-{day}-{fields.title}.md"
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: tags
        label: Tags
        type: list
        hidden: true
        default: [pens]
      - name: categories
        label: Categories
        type: list
        hidden: true
        default: [projects]
      - name: body
        label: Content
        type: rich-text
        options:
            media: images

  - name: pages
    label: Pages
    type: collection
    path: .
    include:
      - index.html
      - about/index.md
      - README.md
    fields:
      - name: title
        label: Title
        type: string
      - name: body
        label: Content
        type: rich-text

  - name: config
    label: Site Configuration
    type: file
    path: _config.yml
    format: yaml
    fields:
      - name: title
        label: Site Title
        type: string
      - name: description
        label: Description
        type: text
      - name: url
        label: Canonical URL
        type: string
      - name: author
        label: Author
        type: string

settings:
  commit:
    message: "Update via Pages CMS"