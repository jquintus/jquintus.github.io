media:
  - name: images
    input: images/posts
    output: /images/posts
    extensions: [png, jpg, webp]
  - name: models
    label: 3D Models
    input: assets/models
    output: /assets/models
    extensions: [stl]

content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    format: yaml-frontmatter
    filename: "{year}/{year}-{month}-{day}-{fields.title}.md"
    media: images
    view:
      fields: [title, date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: tags
        label: Tags
        type: select
        list: true
        required: false
        options:
          values:
            - Pens
            - Pi Project
            - Shopping Cart
            - Status Report
      - name: categories
        label: Categories
        type: select
        list: true
        required: false
        options:
          values:
            - .NET
            - 3D Modeling
            - 3D Printing
            - 8-Bit Computer
            - Adafruit
            - Android
            - Arduino
            - Ben Eater
            - Breadboard
            - C#
            - C++
            - Chrome
            - Christmas
            - CircuitPython
            - CLI
            - Coding
            - ConEmu
            - Debugging
            - Dependency Injection
            - Desserts
            - DIY
            - Docker
            - Feather
            - Food
            - Fritzing
            - Fusion 360
            - GitHub
            - GitHub Pages
            - How-To
            - Hyper-V
            - Icebreakers
            - ICs
            - Interviews
            - IoC
            - iOS
            - Jekyll
            - LED
            - macOS
            - Management
            - Mermaid
            - MvvmCross
            - Ninject
            - Raspberry Pi
            - Recipes
            - Rubik's Cube
            - Serial
            - SSH
            - SSL
            - Terminal
            - Tips
            - Tools
            - Travel
            - UART
            - Vim
            - Visual Studio
            - VSCode
            - Windows Phone
            - Woodworking
            - Xamarin
            - Xamarin Forms
            - Zoom
            - Zsh
      - name: body
        label: Content
        type: rich-text
        options:
            media: images

  - name: about
    label: About Page
    type: file
    path: about/index.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
      - name: body
        label: Content
        type: rich-text

  - name: config
    label: Site Configuration
    type: file
    path: _config.yml
    format: yaml
    fields:
      - name: title
        label: Site Title
        type: string
      - name: description
        label: Description
        type: text
      - name: url
        label: Canonical URL
        type: string
      - name: author
        label: Author
        type: string

settings:
  commit:
    message: "Update via Pages CMS"